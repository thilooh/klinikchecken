  <text x="320" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="600">Praxis PHBi · Bielefeld</text>
  <!-- Road markings -->
  <rect x="300" y="310" width="40" height="8" rx="1" fill="white" opacity="0.5"/>
  <rect x="400" y="310" width="40" height="8" rx="1" fill="white" opacity="0.5"/>
