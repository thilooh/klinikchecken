      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#C9E8F5"/>
    </linearGradient>
    <linearGradient id="road114" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#sky114)"/>
  <rect x="0" y="300" width="640" height="100" fill="url(#road114)"/>
  <rect x="0" y="295" width="640" height="10" fill="#aaa"/>
  <!-- Building -->
  <rect x="160" y="120" width="320" height="180" fill="#003366" opacity="0.15"/>
  <rect x="160" y="120" width="320" height="180" fill="none" stroke="#003366" stroke-width="2" opacity="0.4"/>
  <!-- Windows -->
  <rect x="200" y="150" width="50" height="40" rx="2" fill="white" opacity="0.6"/>
  <rect x="295" y="150" width="50" height="40" rx="2" fill="white" opacity="0.6"/>
  <rect x="390" y="150" width="50" height="40" rx="2" fill="white" opacity="0.6"/>
  <rect x="200" y="220" width="50" height="40" rx="2" fill="white" opacity="0.6"/>
  <rect x="295" y="220" width="50" height="40" rx="2" fill="white" opacity="0.6"/>
  <rect x="390" y="220" width="50" height="40" rx="2" fill="white" opacity="0.6"/>
  <!-- Door -->
  <rect x="296" y="250" width="48" height="50" rx="2" fill="white" opacity="0.4"/>
