<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden – Besenreiser-Check.de</title>
  <meta name="robots" content="noindex" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', Arial, sans-serif; background: #F4F4F4; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { background: #fff; border-radius: 12px; padding: 48px 40px; max-width: 420px; text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    h1 { font-size: 64px; margin: 0 0 8px; color: #003399; }
    h2 { font-size: 20px; color: #111; margin: 0 0 12px; }
    p  { color: #555; font-size: 15px; line-height: 1.6; margin: 0 0 28px; }
    a  { display: inline-block; background: #003399; color: #fff; text-decoration: none; padding: 12px 28px; border-radius: 6px; font-weight: 700; font-size: 15px; }
    a:hover { background: #0040BB; }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <h2>Seite nicht gefunden</h2>
    <p>Die gesuchte Seite existiert nicht. Vielleicht wurde der Link geändert oder du hast dich vertippt.</p>
    <a href="/">Zur Startseite</a>
  </div>
</body>
</html>
