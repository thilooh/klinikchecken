[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed Vite asset bundles - safe to cache forever, content hash invalidates
# on every change. Default Netlify caching is shorter; this matches what
# Lighthouse expects ("efficient cache lifetime" audit).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static images and fonts in /public - long cache, no hash so use 30 days
# instead of "forever". A new deploy with the same filename will invalidate
# via Netlify's atomic deploys.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/ratgeber/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Cached Google Reviews JSON - regenerated every 3 days by GitHub Action,
# so 1-day cache balances freshness with Lighthouse complaint.
[[headers]]
  for = "/reviews/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# clinics.json + treatments.json get refreshed via GitHub Actions (Google
# Reviews sync) and on every code deploy. 1-day cache balances Lighthouse
# "efficient cache lifetime" against staleness when ratings update.
# Atomic Netlify deploys invalidate at the CDN edge regardless of the
# Cache-Control value, so a fresh deploy still hits users immediately.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
