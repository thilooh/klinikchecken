name: Refresh clinic reviews

on:
  schedule:
    - cron: '0 5 */3 * *'   # every 3 days at 05:00 UTC
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh reviews & regenerate summaries
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refresh-reviews.mjs

      - name: Commit & push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/reviews/
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: refresh clinic reviews $(date -u +%Y-%m-%d)"
            git push origin deploy
          )
